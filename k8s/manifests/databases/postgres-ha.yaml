apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres-ha
  namespace: default
  labels:
    app: postgres-ha
spec:
  serviceName: postgres-ha-svc
  replicas: 3
  selector:
    matchLabels:
      app: postgres-ha
  template:
    metadata:
      labels:
        app: postgres-ha
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          env:
            - name: POSTGRES_DB
              value: "soc"
            - name: POSTGRES_USER
              value: "soc"
            - name: POSTGRES_PASSWORD
              value: "changeme"
            # Configuration for replication/Patroni bootstrap
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          ports:
            - containerPort: 5432
              name: postgres
          volumeMounts:
            - name: pgdata
              mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
    - metadata:
        name: pgdata
      spec:
        accessModes: [ "ReadWriteOnce" ]
        resources:
          requests:
            storage: 10Gi
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-ha-svc
  namespace: default
spec:
  ports:
    - port: 5432
      name: postgres
  selector:
    app: postgres-ha
  clusterIP: None
