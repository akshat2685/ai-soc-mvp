apiVersion: apps/v1
kind: Deployment
metadata:
  name: neo4j
spec:
  replicas: 1
  selector:
    matchLabels:
      app: neo4j
  template:
    metadata:
      labels:
        app: neo4j
    spec:
      containers:
      - env:
        - name: NEO4J_AUTH
          value: neo4j/soc_password
        image: neo4j:5.12
        imagePullPolicy: IfNotPresent
        name: neo4j
        ports:
        - containerPort: 7474
        - containerPort: 7687
---
apiVersion: v1
kind: Service
metadata:
  name: neo4j
spec:
  ports:
  - name: port-7474
    port: 7474
    targetPort: 7474
  - name: port-7687
    port: 7687
    targetPort: 7687
  selector:
    app: neo4j
