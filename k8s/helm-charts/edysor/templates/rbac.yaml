apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "edysor.fullname" . }}-sa
  labels:
    app: edysor
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "edysor.fullname" . }}-role
  labels:
    app: edysor
rules:
  - apiGroups: [""]
    resources: ["secrets", "configmaps"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["pods", "services"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "edysor.fullname" . }}-rolebinding
  labels:
    app: edysor
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "edysor.fullname" . }}-role
subjects:
  - kind: ServiceAccount
    name: {{ include "edysor.fullname" . }}-sa
    namespace: {{ .Release.Namespace }}
