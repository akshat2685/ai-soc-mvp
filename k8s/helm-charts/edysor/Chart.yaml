apiVersion: v2
name: edysor
description: A Helm chart for deploying the EDYSOR Self-Improving AI-Native SOC platform in Kubernetes
type: application
version: 1.0.0
appVersion: "1.0.0"
dependencies:
  - name: postgresql
    version: 15.5.4
    repository: https://charts.bitnami.com/bitnami
    condition: postgresql.enabled
  - name: redis
    version: 18.0.0
    repository: https://charts.bitnami.com/bitnami
    condition: redis.enabled
