apiVersion: apps/v1
kind: Deployment
metadata:
  name: soc-consumer
  labels:
    app: soc-consumer
spec:
  replicas: 2
  selector:
    matchLabels:
      app: soc-consumer
  template:
    metadata:
      labels:
        app: soc-consumer
    spec:
      containers:
      - name: soc-consumer
        image: your-registry/soc-backend:latest
        command: ["python", "backend/streaming/consumer_worker.py"] # Assuming entrypoint wrapper
        envFrom:
        - secretRef:
            name: soc-secrets
        - configMapRef:
            name: soc-config
        resources:
          requests:
            cpu: "1000m"
            memory: "2Gi"
          limits:
            cpu: "2000m"
            memory: "4Gi"
