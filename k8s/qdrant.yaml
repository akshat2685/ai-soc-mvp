apiVersion: apps/v1
kind: Deployment
metadata:
  name: qdrant
spec:
  replicas: 1
  selector:
    matchLabels:
      app: qdrant
  template:
    metadata:
      labels:
        app: qdrant
    spec:
      containers:
      - image: qdrant/qdrant
        imagePullPolicy: IfNotPresent
        name: qdrant
        ports:
        - containerPort: 6333
        - containerPort: 6334
---
apiVersion: v1
kind: Service
metadata:
  name: qdrant
spec:
  ports:
  - name: port-6333
    port: 6333
    targetPort: 6333
  - name: port-6334
    port: 6334
    targetPort: 6334
  selector:
    app: qdrant
