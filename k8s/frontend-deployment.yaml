apiVersion: apps/v1
kind: Deployment
metadata:
  name: soc-frontend
  labels:
    app: soc-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: soc-frontend
  template:
    metadata:
      labels:
        app: soc-frontend
    spec:
      containers:
      - name: soc-frontend
        image: your-registry/soc-frontend:latest
        ports:
        - containerPort: 80
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "250m"
            memory: "256Mi"
