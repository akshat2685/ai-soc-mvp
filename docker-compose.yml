version: '3.8'

services:
  soc-frontend:
    build:
      context: ./frontend
    container_name: shieldai-frontend
    ports:
      - "80:80"
    depends_on:
      - soc-backend
    restart: unless-stopped

  soc-backend:
    build: .
    container_name: shieldai-soc
    ports:
      - "8000:8000"
    environment:
      - DB_TYPE=postgres
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=soc
      - POSTGRES_USER=soc
      - POSTGRES_PASSWORD=changeme
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - CLICKHOUSE_HOST=clickhouse
      - CLICKHOUSE_PORT=8123
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4317
      - JWT_SECRET=${JWT_SECRET}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - PYTHONPATH=/app/backend
    volumes:
      - ./backend:/app/backend
      - ./backend/reports:/app/backend/reports
    depends_on:
      - postgres
      - redis
      - kafka
      - clickhouse
      - qdrant
      - jaeger
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: shieldai-postgres
    environment:
      POSTGRES_DB: soc
      POSTGRES_USER: soc
      POSTGRES_PASSWORD: changeme
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: shieldai-redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    container_name: shieldai-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: shieldai-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092'
      KAFKA_JMX_PORT: 9101
      KAFKA_JMX_HOSTNAME: localhost
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka:29093'
      KAFKA_LISTENERS: 'PLAINTEXT://kafka:29092,CONTROLLER://kafka:29093,PLAINTEXT_HOST://0.0.0.0:9092'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'PLAINTEXT'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_LOG_DIRS: '/tmp/kraft-combined-logs'
      CLUSTER_ID: 'MkU3OEVBNTcwNTJENDM2Qk'

  clickhouse:
    image: clickhouse/clickhouse-server:latest
    container_name: shieldai-clickhouse
    ports:
      - "8123:8123"
      - "9000:9000"
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    restart: unless-stopped

  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: shieldai-jaeger
    ports:
      - "16686:16686" # UI
      - "4317:4317"   # OTLP gRPC receiver
      - "4318:4318"   # OTLP HTTP receiver
    restart: unless-stopped

  neo4j:
    image: neo4j:latest
    container_name: shieldai-neo4j
    ports:
      - "7474:7474" # HTTP
      - "7687:7687" # Bolt
    environment:
      - NEO4J_AUTH=neo4j/password
    restart: unless-stopped

  caldera:
    image: mitrecnd/caldera:latest
    container_name: shieldai-caldera
    ports:
      - "8888:8888" # UI
      - "7010:7010" # Agents
    environment:
      - CALDERA_URL=http://localhost:8888
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: shieldai-prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: shieldai-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    depends_on:
      - prometheus
    restart: unless-stopped

  cowrie:
    image: cowrie/cowrie:latest
    container_name: shieldai-cowrie-canary
    ports:
      - "2222:2222" # SSH honeypot
      - "2223:2223" # Telnet honeypot
    environment:
      - COWRIE_TELNET_ENABLED=yes
    volumes:
      - cowrie_data:/cowrie/cowrie-git/var
    restart: unless-stopped

  dionaea:
    image: dinotools/dionaea:latest
    container_name: shieldai-dionaea
    ports:
      - "21:21"
      - "42:42"
      - "135:135"
      - "443:443"
      - "445:445"
      - "1433:1433"
      - "3306:3306"
    restart: unless-stopped

volumes:
  pgdata:
  qdrant_data:
  cowrie_data:
