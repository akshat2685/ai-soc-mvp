version: '3.8'

services:
  soc-backend:
    build: .
    container_name: shieldai-soc
    ports:
      - "8000:8000"
    environment:
      - DB_TYPE=postgres
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=soc
      - POSTGRES_USER=soc
      - POSTGRES_PASSWORD=changeme
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - CLICKHOUSE_HOST=clickhouse
      - CLICKHOUSE_PORT=8123
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4317
      - JWT_SECRET=shieldai-change-this-in-production
      - PYTHONPATH=/app/backend
    volumes:
      - ./backend:/app/backend
      - ./backend/reports:/app/backend/reports
    depends_on:
      - postgres
      - redis
      - kafka
      - clickhouse
      - qdrant
      - jaeger
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: shieldai-postgres
    environment:
      POSTGRES_DB: soc
      POSTGRES_USER: soc
      POSTGRES_PASSWORD: changeme
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: shieldai-redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    container_name: shieldai-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: shieldai-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: shieldai-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: 'zookeeper:2181'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  clickhouse:
    image: clickhouse/clickhouse-server:latest
    container_name: shieldai-clickhouse
    ports:
      - "8123:8123"
      - "9000:9000"
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    restart: unless-stopped

  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: shieldai-jaeger
    ports:
      - "16686:16686" # UI
      - "4317:4317"   # OTLP gRPC receiver
      - "4318:4318"   # OTLP HTTP receiver
    restart: unless-stopped

volumes:
  pgdata:
  qdrant_data:
